<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscription</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="w-[320px] bg-white rounded-xl shadow-lg border p-6 relative group">

    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-400 to-blue-400 rounded-t-xl"></div>

    <h2 class="text-xl font-semibold mb-3">Starter</h2>

    <span class="text-xs bg-gray-200 px-2 py-1 rounded">
7-days free then:
</span>

    <div class="mt-3">
        <span class="text-4xl font-bold">$83.25</span>
        <span class="text-gray-500">/month</span>
    </div>

    <p class="text-gray-500 text-sm mb-4">
        Billed yearly at $999.00
    </p>

    <button
            class="w-full py-2 border rounded-lg bg-gray-200 text-gray-600 relative group">
        Downgrade to Starter

        <span class="absolute hidden group-hover:block bg-black text-white text-xs p-2 rounded -top-12 left-1/2 -translate-x-1/2 w-[220px]">
You cannot downgrade your plan until within 30 days of your next billing date.
</span>

    </button>

    <hr class="my-5">

    <ul class="space-y-3 text-sm">

        <li class="flex gap-2">
            <span class="text-green-500">★</span>
            Primary user + 0 free team members
        </li>

        <li class="flex gap-2">
            <span class="text-green-500">★</span>
            Save unlimited properties
        </li>

        <li class="flex gap-2">
            <span class="text-green-500">★</span>
            10 000 exports
        </li>

        <li class="flex gap-2">
            <span class="text-green-500">★</span>
            500 free skip traces
        </li>

        <li class="flex gap-2">
            <span class="text-green-500">★</span>
            Imports $0.01
        </li>

    </ul>

</div>

</body>
</html>
